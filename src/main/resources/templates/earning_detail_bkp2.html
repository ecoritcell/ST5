document.addEventListener('keydown', function (event) {

    // Check Enter key
    if (event.key !== 'Enter') return;

    // Only act for inputs inside detail table
    if (!event.target.matches('#tbl-data-body input')) return;

    event.preventDefault();      // stop form submit
    event.stopPropagation();     // stop bubbling

    const inputs = Array.from(
        document.querySelectorAll('#tbl-data-body input:not([readonly])')
    );
    const index = inputs.indexOf(event.target);
    const next = inputs[index + 1];

    if (next) {
        next.focus();
    }
});

function getFinancialYear() {
	
    const today = new Date();
    const month = today.getMonth() + 1; // getMonth() is 0-indexed
    const year = today.getFullYear();
    

    if (month >= 4) {
        return year + "-" + String(year + 1).slice(-2);  // e.g., "2026-27"
    } else {
        return (year - 1) + "-" + String(year).slice(-2); // e.g., "2025-26"
    }
}

function getNextFinancialYear() {
	
	const financialyear = $("#financialyear").val();
	const formonth = $("#formonth").val();
	
    const month = today.getMonth() + 1;
    const year = today.getFullYear();

    if (month >= 4) {
        return (year + 1) + "-" + String(year + 2).slice(-2);  // e.g., "2027-28"
    } else {
        return year + "-" + String(year + 1).slice(-2);         // e.g., "2026-27"
    }
}

function getCurrentMonth() {
    const today = new Date();
    const month = String(today.getMonth() + 1).padStart(2, '0');
	return month;
}

function getCurrentPeriod() {
    const today = new Date();
    const date = today.getDate();
    if(date<=10)
    	return "I";
    else if(date<=20)
    	return "II";
    else
    	return "III";	
}

function loadReceivedOnFinancialYear() {
	
    // Remove all options except the default placeholder
    $('#receivedfy option[value!="-1"]').remove();
    $('#receivedmonth option[value!="-1"]').remove();
    $('#receivedperiod option[value!="-1"]').remove();
    
    let valtype = $("#value-type").val();
	if(valtype === 'A')
		return;
    
	const financialyear = $("#financialyear").val();
	const formonth = $("#for-month").val();
	const period = $("#period").val();
	
	if(financialyear !=null && financialyear.length == 7 &&
			formonth !=null && formonth.length == 2 &&
			period !=null){
		
   	    const monthInt = parseInt(formonth);
		
	    const years = [financialyear];
	   /*  if(monthInt === 3 && (period === "III" || period === "MON")  ){
	    	console.log("Current fy not needed")	
	    }else{
	    	
	    	years.push(financialyear);
	    } */
	    
	    
	    // Add next FY only if we're in Jan, Feb, or March (approaching new FY)
	    if (monthInt < 4) {
	    	
			const [fromYear, toYear] = financialyear.split("-");
			const nextFY = String(+fromYear + 1)+"-"+ String(+toYear + 1)	    	 
	        years.push(nextFY);
	    }

	    years.forEach(fy => {
	        $('#receivedfy').append(`<option value="${fy}">${fy}</option>`);
	    });
	    
	    
	    if(years.length > 0)
	    	$('#receivedfy').val(years[0]);
	    
	    
	    /* $("#receivedfy").trigger("change"); */
	    receivedFyChanged();
	}
    
}

function systemChanged(ele){

	if(systype === 'P'){
				
		let option = '<option value="PNSUB">PASSENGER[NON-SUB]</option>' +

	}else if(systype === 'M'){

}

function valueTypeChanged(ele){
	
	$("#recordid").val(""); 
	let valtype = $(ele).val();
	if(valtype === 'A'){
		
		$("#receivedfy").val("-1");
		$("#receivedmonth").val("-1");
		$("#receivedperiod").val("-1");
		$("#remarks").val("-1");
		
		$("#receivedfy").prop("disabled",true);
		$("#receivedmonth").prop("disabled",true);
		$("#receivedperiod").prop("disabled",true);
		$("#remarks").prop("disabled",true);
		
	}else{
		
		$("#receivedfy").prop("disabled",false);
		$("#receivedmonth").prop("disabled",false);
		$("#receivedperiod").prop("disabled",false);
		$("#remarks").prop("disabled",false);
		
		loadReceivedOnFinancialYear();	
		
	}
	goClicked();
}

function receivedFyChanged(){
	
	console.log("receivedFyChanged called");
	$('#receivedmonth option[value!="-1"]').remove();
	const rcvdFy = $("#receivedfy").val();
	const fy = $("#financialyear").val();
	const formonth = $("#for-month").val();
	const monthint = parseInt(formonth);
	const period = $("#period").val();
	
	// FY months with their corresponding month numbers
    const months = [
        { val: "04", label: "Apr" },
        { val: "05", label: "May" },
        { val: "06", label: "June" },
        { val: "07", label: "July" },
        { val: "08", label: "Aug" },
        { val: "09", label: "Sep" },
        { val: "10", label: "Oct" },
        { val: "11", label: "Nov" },
        { val: "12", label: "Dec" },
        { val: "01", label: "Jan" },
        { val: "02", label: "Feb" },
        { val: "03", label: "Mar" }
    ];
	
	let currentIndex  =  monthint >= 4 ? monthint - 4 : monthint + 8;
	if(fy === rcvdFy){
						
		if(currentIndex <= 11){
			const next = months[currentIndex];
	        $('#receivedmonth').append(`<option value="${next.val}">${next.label}</option>`);
	        $('#receivedmonth').val(next.val);
		}
			
		currentIndex ++;
		if(currentIndex <= 11){
			
			const next = months[currentIndex];
	        $('#receivedmonth').append(`<option value="${next.val}">${next.label}</option>`);
		}
			
		
		currentIndex ++;
		if(currentIndex <= 11){
			const next = months[currentIndex];
	        $('#receivedmonth').append(`<option value="${next.val}">${next.label}</option>`);
		}	
		
	}else{ //This is for the next financial year
		
		if(monthint === 2){
			
			const next = months[0];
	        $('#receivedmonth').append(`<option value="${next.val}">${next.label}</option>`);
	        $('#receivedmonth').val(next.val);
			
		}else if(monthint === 3){
			const next = months[0];
	        $('#receivedmonth').append(`<option value="${next.val}">${next.label}</option>`);
	        $('#receivedmonth').val(next.val);
	        
	        const next1 = months[1];
	        $('#receivedmonth').append(`<option value="${next1.val}">${next1.label}</option>`);
		}
	}
	
	/* $("#receivedmonth").trigger("change"); */
	receivedMonthChanged()
	
}

function receivedMonthChanged(){
	
	const valuetype = $("#value-type").val();
	if(valuetype === "A")
		return;	
	
	$('#receivedperiod option[value !="-1"]').remove();
	const rcvdmonth = $("#receivedmonth").val();
	const fy = $("#financialyear").val();
	const formonth = $("#for-month").val();
	const period = $("#period").val();
	
	const receivedfy = $("#receivedfy").val();
	const receivedmonth = $("#receivedmonth").val();
	
	if(fy === receivedfy && formonth === receivedmonth){
		
		if(period === "I"){
			
			 $('#receivedperiod').append(`<option value="I">I</option>`);
			 $('#receivedperiod').append(`<option value="II">II</option>`);
			 $('#receivedperiod').append(`<option value="III">III</option>`);	
			 $('#receivedperiod').val("I");
		}else if(period === "II"){
		
			 $('#receivedperiod').append(`<option value="II">II</option>`);
			 $('#receivedperiod').append(`<option value="III">III</option>`);
			 $('#receivedperiod').val("II");
			 
		}else if(period === "III" || period === "MON"){
						 
			 $('#receivedperiod').append(`<option value="III">III</option>`);
			 $('#receivedperiod').val("III");
		}		
		
	}else{
		
		 $('#receivedperiod').append(`<option value="I">I</option>`);
		 $('#receivedperiod').append(`<option value="II">II</option>`);
		 $('#receivedperiod').append(`<option value="III">III</option>`);		 	
		 $('#receivedperiod').val("I");
	}	
	
	
}

function stnTypeChanged(){
	
	console.log("stnTypeChanged called");
	$('#station option[value !="-1"]').remove();
	$('#station-list').empty();
	
	let entrytype = $("#entry-type").val();
	let stntype = $("#stn-type").val();

	if(entrytype === "SW" && (stntype === null || stntype === "-1"))
			return;	
	if(entrytype === "ZW" || entrytype === "DW")
		$("#division").val("-1");
	
	let fy = $("#financialyear").val();
	let formonth = $("#for-month").val();
	let period = $("#period").val();
	let hoa = $("#head_of_acct").val();
	let system = $("#system").val();
	let division = $("#division").val();

	let errormsg = null;
	if(fy != null && fy.length != 7){
		errormsg ="Enter valid financial year";
	}else if(formonth == null || formonth.length != 2){
		errormsg = "Select for month.";
	}else if(period == null || period.length == 0){
		errormsg = "Select period.";
	}else if(hoa == null || hoa.length == 0){
		errormsg = "Select head of account.";
	}else if(system == null || system.length == 0){
		errormsg = "Select system.";
	}else if(entrytype == null || entrytype.length != 2){
		errormsg = "Select entry type.";
	}else if(entrytype === "SW" && (division == null || division === "-1")){
		errormsg = "Select division.";
	}else if(entrytype === "SW" && (stntype == null || stntype === "-1" || stntype.length != 2)){
		errormsg = "Select station type.";
	}
	
	 if (errormsg) {
	        alert(errormsg);
	        $("#stn-type").val("-1");   // ← reset stntype dropdown back to -1
	        return;
	   }
	
	var jsondata = {
			fy:fy,
			formonth:formonth,
			period:period,
			hoa:hoa,
			system:system,
			entrytype:entrytype,
			division: division,
			stntype: stntype		
		};

		$.ajax({
			url: "/earning/getstationdata",
			type: "POST",
			contentType: "application/json",
			data: JSON.stringify(jsondata),
			success: function(response) {

				if (response.status === "success") {
					
					console.log("Success.");
					$.each(response.data, function(index, obj) {
						
						let colorcode = getColorCodeforValueTypeAndRemarks(obj.valuetype,obj.remarks);							
						/* let option = '<option style="color:'+colorcode+';"'+ ' value="'+obj.stncode+'">'+obj.stncode+'</option>'; */
						if(entrytype === "SW"){
							let option = '<option value="'+obj.code+'">'+obj.code+'</option>';
							$('#station').append(option);			
						}						
						
						let li = $('<li>')
			            .text(obj.code)
			            .attr('data-code', obj.code)
			            .attr('data-id', obj.id)
			            .attr('data-parentid', obj.parentrecordid)
			            .attr('data-valuetype', obj.valuetype)
			            .attr('data-rfy', obj.receivedfy)
			            .attr('data-rmonth', obj.receivedmonth)
			            .attr('data-rperiod', obj.receivedperiod)
			            .attr('data-remarks', obj.remarks)
			            .css('color', colorcode);

			        // ✅ Reference separate function — not inline
				        li.on('click', function() {
				            onListItemClick(this);
				        });
			        
				        $('#station-list').append(li);
			        
	       			}); 
					
					selectItemById(); 

					
				} else {
					console.log("Some error occured.");
				}
			},
			error: function() {

				console.log("Something went wrong!");
				alert("Something went wrong!");
			}
		});		
	
	
	
	/* 
	if(stntype === "90"){
		$("#period").val("I");
	}else if(stntype === "10"){
		$("#period").val("MON");
	} */
	
}


function selectItemById(){

	if(selectedDataId != null){
				
		let liElement = $('#station-list li').filter(function() {
		    return $(this).attr('data-id') == selectedDataId;  // == handles type coercion
		})[0];
		
	    if (liElement) {
	        onListItemClick(liElement);
	    } else {
	        console.log("Station not found in list for id: " + String(selectedDataId));
	    }
	}
		
}

function getColorCodeforValueTypeAndRemarks(valtype,remark){
	
	if(valtype == null)
		return "black";
	
	if(valtype === "O" && remark === "LR")
		return "red";
	else if(valtype === "O")
		return "green";
	else if(valtype === "A")
		return "blue";
	else
		return "black";
}

			 }
			 
			 if(stationearning.amount > 0){
				 
				 let fieldrsname = "input_"+ecat+"_"+(++tempindex);
				 console.log("fieldrsname = "+fieldrsname);
				 if (!formdata[fieldrsname]){
					 formdata[fieldrsname] = {};   // create new key
				 }

/*Recalculate Totals */

function recalcAll() {

	if(currenthoa === "PNSUB" || currenthoa === "PSUB"){
		
		 // 1️⃣ Recalc all atomic rows
		   document.querySelectorAll("input.calc")
		        .forEach(el => recalcRow(el.dataset.class));

		    // 2️⃣ Recalc derived groups in order
		    ["AC","FC","SLC","SC"].forEach(recalcGroup);

		    // 3️⃣ Grand total
		    recalcGroup("TOT");
		    
	}else if(currenthoa === "OTHC"){
		
		recalcOtherCoaching("OTHC_TOT");
		
	}else if(currenthoa === "OTHG"){
		
		recalcOtherGoods("OTHG_TOT");
		
	}else if(currenthoa === "SUN"){
		
		recalcOtherGoods("SUN_TOT");
	}
   
}

function recalcOtherGoods(groupCode){
	
	let totEarning=0;

    GROUPS[groupCode].forEach(code => {
    	
    	totEarning += get(code,"earning");
    });
    
    set(groupCode,"earning", totEarning);

    /* recalcRow(groupCode); */
}

function recalcOtherCoaching(groupCode){
	
	let totWeight=0, totEarning=0;

    GROUPS[groupCode].forEach(code => {
    	
    	totWeight += get(code,"weight");
    	totEarning += get(code,"earning");
    });

    
    set(groupCode,"weight", totWeight);
    set(groupCode,"earning", totEarning);

    /* recalcRow(groupCode); */
}

function recalcRow(cls) {
	/* console.log("Class = " +cls); */
    const totalNo =
        get(cls,"bookedcount") -
        get(cls,"refundcount") +
        get(cls,"excesscount");

    const totalRs =
        get(cls,"bookedamt") -
        get(cls,"refundamt") +
        get(cls,"excessamt");

    set(cls,"totalno", totalNo);
    set(cls,"totalrs", totalRs);
}

function recalcGroup(groupCode) {

    let bookedCnt=0, refundCnt=0, excessCnt=0;
    let bookedAmt=0, refundAmt=0, excessAmt=0;

    GROUPS[groupCode].forEach(code => {
        bookedCnt += get(code,"bookedcount");
        refundCnt += get(code,"refundcount");
        excessCnt += get(code,"excesscount");

        bookedAmt += get(code,"bookedamt");
        refundAmt += get(code,"refundamt");
        excessAmt += get(code,"excessamt");
    });

    /* console.log(groupCode +"=" +bookedCnt+","+refundCnt+","+excessCnt+","); */
    
    set(groupCode,"bookedcount", bookedCnt);
    set(groupCode,"refundcount", refundCnt);
    set(groupCode,"excesscount", excessCnt);

    set(groupCode,"bookedamt", bookedAmt);
    set(groupCode,"refundamt", refundAmt);
    set(groupCode,"excessamt", excessAmt);

    recalcRow(groupCode);
}



function get(classCode, field) {
	
    const el = document.querySelector(
        `input[data-class="${classCode}"][data-field="${field}"]`
    );
    
    return el ? getsafevalue(el.value) : 0;
}

function set(classCode, field, value) {
    const el = document.querySelector(
        `input[data-class="${classCode}"][data-field="${field}"]`
    );
    
    /* if (el) el.value = value ? value.toFixed(2) : ""; */
    if (el) el.value = value ? value : "";
}

function getsafevalue(v) {
    return parseFloat(v) || 0;
}
