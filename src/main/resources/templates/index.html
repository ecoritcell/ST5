<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login</title>
<script th:src="@{https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js}"></script>
<link rel="stylesheet" th:href="@{/css/index.css}">

</head>
<body>
				
	 <div class="login-container">
	 
	 	<div class="div_left">
	 		<img class="img_pension" alt="" th:src="@{/images/indian_rail.jpg}">
	 	</div>
	 		 
        <div class="login-card">
        	<div style="margin-top: -100px; ">
        		<div class="login-header">
	                <h2>Sign In</h2>
	                <p>Enter your credentials to access your account</p>
           		 </div>
            
		            <form class="login-form" id="loginForm" novalidate action="#">
		                <div class="form-group">
		                    <div class="input-wrapper">
		                        <input type="text" id="uname" name="uname" placeholder="Username" required>
		                    </div>
		                    <span class="error-message" id="unameError"></span>
		                </div>
		
		                <div class="form-group">
		                    <div class="input-wrapper password-wrapper">
		                        <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
		                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility" onclick="eyecliked(this)">
		                            <span class="eye-icon"></span>
		                        </button>
		                    </div>
		                    <span class="error-message" id="passwordError"></span>
		                </div>
		
		                <button type="button" class="login-btn" onclick="loginClicked()">
		                    <span class="btn-text">Sign In</span>
		                    <span class="btn-loader"></span>
		                </button>
		            </form>
        	</div>
        </div>
    </div>	    
</body>


<script type="text/javascript">

function loginClicked()
{
	clearErrorMsg ();
	
	let userName =  document.getElementById("uname").value.trim();
	let userPassword =  document.getElementById("password").value.trim();
	if(userName.length==0){
		$("#unameError").text("Enter username.");
		$("#unameError").addClass("show");
	}
	else if(userPassword.length==0){
		$("#passwordError").text("Enter password.");
		$("#passwordError").addClass("show");
	}
	else{
		
		var userData = {
				username: userName,
				password: userPassword
            };
		
		$.ajax({
            url: "/users/validateUser",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(userData),
            success: function (response) {
            	console.log("response ="+response);
                if (response.status === "success") {
                    window.location.href = "dashboard";
                } else {
                    alert("Invalid username or password");
                }
            },
            error: function () {
                alert("Something went wrong!");
            }
        });
		
	}

}

function clearErrorMsg(){

	$("#unameError").removeClass("show");
	$("#passwordError").removeClass("show");
}

function eyecliked(ele){
	
	const eyeIcon = ele.querySelector('.eye-icon');
    const password = document.getElementById('password');
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    
    if (eyeIcon) {
        eyeIcon.classList.toggle('show-password');
    }
        
    // Keep focus on password input
    password.focus();

    // Change icon (eye open/closed)
    /* togglePassword.textContent = type === 'password' ? '👁️' : '🙈'; */
      

}

</script>


</html>
